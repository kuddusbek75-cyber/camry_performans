{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ category.name }} - Camry Performans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><a class="navbar-brand" href="/">Camry Performans</a></div>
</nav>

<div class="container">
    <h2>{{ category.name }}</h2>
    <hr>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for product in products %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ product.title }}</h5>
                    <p class="card-text text-muted">{{ product.description|truncatewords:10 }}</p>
                    <h4 class="text-primary">{{ product.price }} сом</h4>
                </div>
            </div>
        </div>
        {% empty %}
        <p>В этой категории пока нет товаров.</p>
        {% endfor %}
    </div>
    <a href="/" class="btn btn-secondary mt-5">Назад к категориям</a>
</div>
</body>
</html>
