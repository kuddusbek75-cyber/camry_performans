{% extends 'base.html' %}
{% block title %}Вход — CAMRY PERFORMANS{% endblock %}
{% block content %}

<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:4rem 1rem">
  <div style="width:100%;max-width:460px">

    <p class="section-label" style="text-align:center">АККАУНТ</p>
    <h1 class="section-title" style="text-align:center;margin-bottom:2rem">ВХОД</h1>

    <div style="background:var(--card);border:1px solid var(--border);padding:2.5rem">
      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label">Логин</label>
          <input type="text" name="username" class="form-input" placeholder="Ваш логин" required>
        </div>

        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input type="password" name="password" class="form-input" placeholder="Ваш пароль" required>
        </div>

        {% if form.errors %}
        <div style="background:#1a0a0a;border:1px solid var(--red);padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.85rem;color:var(--red)">
          Неверный логин или пароль
        </div>
        {% endif %}

          ВОЙТИ
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.5rem">
        <span style="color:var(--muted);font-size:0.9rem">Нет аккаунта?</span>
        <a href="/register/" style="color:var(--red);margin-left:0.5rem;font-weight:700">РЕГИСТРАЦИЯ</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
